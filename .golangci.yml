version: "2"

formatters:
  enable:
    - gofumpt

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gocritic
    - misspell
    - prealloc
    - revive
    - unconvert
    - bodyclose
    - noctx
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
      - linters:
          - gocritic
        text: "hugeParam|rangeValCopy|appendAssign"
